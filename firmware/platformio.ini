; PlatformIO config - status-led (Wemos D1 Mini + WS2812B)
; ---------------------------------------------------------------------------
; Dependencies (versions pinned for reproducibility):
;   platform  : espressif8266@4.2.1
;   library   : adafruit/Adafruit NeoPixel @ 1.15.5
;   framework : Arduino (ESP8266 core, comes with the platform)
;
; Setup:
;   pip3 install platformio      (or brew install platformio)
;
; Commands:
;   pio run                      (compile only)
;   pio run -t upload            (flash to the board - USB must be connected)
;   pio device monitor           (serial monitor - 115200 baud)

[platformio]
default_envs = d1_mini

[env:d1_mini]
platform = espressif8266@4.2.1
board = d1_mini
framework = arduino

lib_deps =
    adafruit/Adafruit NeoPixel @ 1.15.5

monitor_speed = 115200
; 921600 triggers "Invalid head of packet" on CH340-clone D1 Minis;
; 460800 is safe (115200 always works but is slower).
upload_speed = 460800
